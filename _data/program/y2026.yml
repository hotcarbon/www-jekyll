keynote:
  title: "Designing Sustainable Computer Systems with AI-Driven LCA"
  authors: "Vikram Iyer (University of Washington)"
  start: '9:05'
  stop: '10:00'
  duration: 55min  
  slides: 
  video: 
  yt-id: 
  abstract: "The environmental impact of computing is projected to grow rapidly over the next decade. Achieving meaningful reductions in climate impact requires reimagining how we design, manufacture, and assess the carbon footprint of computing systems. In this talk, I will first highlight key challenges in incorporating sustainability considerations like carbon into the design process followed by a set of AI driven methods to accelerate embodied carbon estimation. This includes multi-agent systems that collect and reason about publicly available data to reduce cradle-to-gate life-cycle assessments from days to seconds, and interactive interfaces to visualize sustainability data. Together, these techniques seek to empower designers with new decarbonization levers and early stage design insights."

